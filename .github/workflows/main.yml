name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select an iOS 26 simulator
        id: simulator
        shell: bash
        run: |
          simulator_id="$(.github/ci-tools/select-ios-simulator.sh 26)"
          echo "id=$simulator_id" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          mkdir -p TestResults
          xcodebuild test \
            -scheme Surround \
            -project Surround.xcodeproj \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults/SurroundTests.xcresult

      - name: Export coverage report
        if: ${{ always() && hashFiles('TestResults/SurroundTests.xcresult/**') != '' }}
        shell: bash
        run: xcrun xccov view --report --json TestResults/SurroundTests.xcresult > TestResults/coverage.json

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: surround-test-results
          path: TestResults
          if-no-files-found: warn
          retention-days: 14
